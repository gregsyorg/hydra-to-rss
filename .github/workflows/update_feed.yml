name: Update feed

on:
  schedule:
    - cron: "0 * * * *"   # cada hora en punto (UTC)
  workflow_dispatch:        # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write           # necesario para que el bot pueda hacer push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generar feed.xml
        run: python convert.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          # Si no hay cambios, no falla el workflow:
          git diff --quiet --cached || git commit -m "Auto-update feed.xml"
          git push
